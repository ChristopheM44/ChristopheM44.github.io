<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Flip7 Score">
    <title>Flip7 Score Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-alt: #334155;
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --secondary: #10b981;
            --accent: #f59e0b;
            --danger: #ef4444;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --safe-top: env(safe-area-inset-top, 20px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: calc(var(--safe-top) + 20px) 20px 100px;
            min-height: 100vh;
            line-height: 1.5;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Player List & Cards */
        .players-container {
            display: grid;
            gap: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .player-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .player-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--primary);
        }

        .player-info h3 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
        }

        .player-info p {
            margin: 4px 0 0;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .player-actions {
            display: flex;
            gap: 10px;
        }

        .player-card.winner {
            border: 2px solid var(--accent);
            background: linear-gradient(135deg, var(--surface), #451a03);
        }

        .player-history {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .player-history.active {
            display: block;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
        }

        /* Buttons */
        .btn {
            border: none;
            border-radius: var(--radius-md);
            padding: 12px 20px;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--surface-alt);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-icon {
            width: 48px;
            height: 48px;
            padding: 0;
            border-radius: 50%;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        /* Floating Controls */
        .bottom-controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, var(--bg) 20%);
            display: flex;
            justify-content: center;
            gap: 16px;
            z-index: 100;
        }

        .btn-add-round {
            padding: 16px 32px;
            border-radius: 50px;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
            font-size: 1.1rem;
        }

        /* Modal / Calculator Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .overlay.active {
            display: flex;
        }

        .modal {
            background: var(--surface);
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        /* Scoring Components */
        .scoring-section {
            margin-bottom: 24px;
        }

        .scoring-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 8px;
        }

        .card-btn {
            aspect-ratio: 2/3;
            background: var(--surface-alt);
            border: 2px solid transparent;
            border-radius: 8px;
            color: var(--text);
            font-weight: 700;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .card-btn.selected {
            background: var(--primary);
            border-color: white;
            transform: scale(1.05);
        }

        .card-btn.duplicate {
            background: var(--danger);
            animation: shake 0.4s;
        }

        .modifier-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .mod-btn {
            flex: 1;
            min-width: 60px;
            background: var(--surface-alt);
            border: none;
            border-radius: 8px;
            padding: 10px;
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
        }

        .mod-btn.active {
            background: var(--secondary);
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface-alt);
            padding: 12px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 8px;
        }

        .score-preview {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 24px;
            border-radius: var(--radius-lg);
            text-align: center;
            margin-top: 32px;
        }

        .score-preview-val {
            font-size: 3rem;
            font-weight: 800;
            display: block;
        }

        .score-preview-label {
            font-size: 0.875rem;
            opacity: 0.8;
            font-weight: 600;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-4px);
            }

            75% {
                transform: translateX(4px);
            }
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <h1>Flip7 Score</h1>

    <div id="playersList" class="players-container">
        <!-- Players will be rendered here -->
    </div>

    <div class="bottom-controls">
        <button class="btn btn-danger" onclick="resetGame()">
            <span>Reset</span>
        </button>
        <button class="btn btn-secondary" onclick="openAddPlayerModal()">
            <span>+ Joueur</span>
        </button>
        <button class="btn btn-primary btn-add-round" onclick="startNewRound()">
            <span>Nouvelle Manche</span>
        </button>
    </div>

    <!-- Modals -->
    <div id="playerModal" class="overlay">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Ajouter un joueur</span>
                <button class="btn btn-icon btn-secondary" onclick="closeModals()">✕</button>
            </div>
            <input type="text" id="playerNameInput" placeholder="Nom du joueur"
                style="width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--surface-alt); color: white; font-size: 1.1rem; margin-bottom: 20px;">
            <button class="btn btn-primary" style="width: 100%;" onclick="addPlayer()">Confirmer</button>
        </div>
    </div>

    <div id="scoringModal" class="overlay">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="scoringModalTitle">Score : Joueur</span>
                <button class="btn btn-icon btn-secondary" onclick="closeModals()">✕</button>
            </div>

            <div class="scoring-section">
                <div class="scoring-label">Cartes Chiffres</div>
                <div class="card-grid" id="numberCardsGrid">
                    <!-- Cards 0-12 -->
                </div>
            </div>

            <div class="scoring-section">
                <div class="scoring-label">Modificateurs</div>
                <div class="modifier-grid" id="modifiersGrid">
                    <!-- +2 to +10 -->
                </div>
            </div>

            <div class="scoring-section">
                <div class="toggle-row">
                    <span>Multiplicateur x2</span>
                    <button id="multiplierBtn" class="mod-btn" style="width: auto; padding: 6px 12px;"
                        onclick="toggleMultiplier()">ACTIVER</button>
                </div>
                <div class="toggle-row">
                    <span>Seconde Chance</span>
                    <button id="secondChanceBtn" class="mod-btn" style="width: auto; padding: 6px 12px;"
                        onclick="toggleSecondChance()">ACTIVER</button>
                </div>
                <div id="flip7Row" class="toggle-row"
                    style="background: rgba(245, 158, 11, 0.1); border: 1px solid var(--accent); display: none;">
                    <span style="color: var(--accent); font-weight: 700;">✨ BONUS FLIP 7 (+15)</span>
                </div>
                <div id="bustRow" class="toggle-row"
                    style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); display: none;">
                    <span style="color: var(--danger); font-weight: 700;">💥 ÉLIMINÉ (0 pts)</span>
                </div>
            </div>

            <div class="score-preview">
                <span class="score-preview-label">Points pour cette manche</span>
                <span id="currentRoundScore" class="score-preview-val">0</span>
            </div>

            <button class="btn btn-primary" style="width: 100%; margin-top: 24px; padding: 16px;"
                onclick="saveRoundScore()">Valider le score</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'flip7_master_data';
        let players = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let currentPlayerIndex = null;
        let currentRoundDraft = {
            numbers: [],
            modifiers: [],
            hasMultiplier: false,
            hasSecondChance: false,
            isBusted: false,
            hasFlip7: false
        };

        // --- Core Functions ---
        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(players));
        }

        function renderPlayers() {
            const container = document.getElementById('playersList');
            container.innerHTML = '';

            if (players.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-muted);">Ajoutez des joueurs pour commencer...</div>`;
                return;
            }

            players.sort((a, b) => b.score - a.score).forEach((player, originalIndex) => {
                const pIndex = players.indexOf(player);
                const isWinner = player.score >= 200;

                const card = document.createElement('div');
                card.className = `player-card fade-in ${isWinner ? 'winner' : ''}`;
                card.innerHTML = `
                    <div style="flex-grow: 1;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div class="player-info" onclick="toggleHistory(${pIndex})">
                                <h3>${player.name} ${isWinner ? '👑' : ''}</h3>
                                <p>${player.score}</p>
                            </div>
                            <div class="player-actions">
                                <button class="btn btn-secondary" onclick="openScoringModal(${pIndex})">Points</button>
                                <button class="btn btn-danger btn-icon" onclick="removePlayer(${pIndex})">✕</button>
                            </div>
                        </div>
                        <div id="history-${pIndex}" class="player-history">
                            <strong>Historique :</strong>
                            ${player.rounds.length === 0 ? '<div>Aucune manche jouée.</div>' :
                        player.rounds.map((r, i) => `
                                    <div class="history-item">
                                        <span>Manche ${i + 1} : ${r.numbers.join(', ')} ${r.modifiers.map(m => '+' + m).join(' ')} ${r.hasMultiplier ? 'x2' : ''}</span>
                                        <span style="color:var(--primary); font-weight:700;">+${r.score}</span>
                                    </div>
                                `).join('')
                    }
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleHistory(index) {
            const el = document.getElementById(`history-${index}`);
            el.classList.toggle('active');
        }

        // --- Modals ---
        function openAddPlayerModal() {
            document.getElementById('playerModal').classList.add('active');
            document.getElementById('playerNameInput').focus();
        }

        function openScoringModal(index) {
            currentPlayerIndex = index;
            const player = players[index];
            document.getElementById('scoringModalTitle').innerText = `Score : ${player.name}`;
            resetRoundDraft();
            renderScoringOptions();
            updateLiveScore();
            document.getElementById('scoringModal').classList.add('active');
        }

        function closeModals() {
            document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
        }

        // --- Player Management ---
        function addPlayer() {
            const input = document.getElementById('playerNameInput');
            const name = input.value.trim();
            if (name) {
                players.push({ name, score: 0, rounds: [] });
                saveToStorage();
                renderPlayers();
                closeModals();
                input.value = '';
            }
        }

        function removePlayer(index) {
            if (confirm(`Supprimer ${players[index].name} ?`)) {
                players.splice(index, 1);
                saveToStorage();
                renderPlayers();
            }
        }

        function resetGame() {
            if (confirm("Réinitialiser tous les scores ?")) {
                players.forEach(p => {
                    p.score = 0;
                    p.rounds = [];
                });
                saveToStorage();
                renderPlayers();
            }
        }

        // --- Scoring Logic ---
        function resetRoundDraft() {
            currentRoundDraft = {
                numbers: [],
                modifiers: [],
                hasMultiplier: false,
                hasSecondChance: false,
                isBusted: false,
                hasFlip7: false
            };
        }

        function renderScoringOptions() {
            // Numbers 0-12
            const grid = document.getElementById('numberCardsGrid');
            grid.innerHTML = '';
            for (let i = 0; i <= 12; i++) {
                const btn = document.createElement('button');
                btn.className = 'card-btn';
                btn.innerText = i;
                btn.onclick = () => toggleNumber(i);
                grid.appendChild(btn);
            }

            // Modifiers +2 to +10
            const modGrid = document.getElementById('modifiersGrid');
            modGrid.innerHTML = '';
            [2, 3, 4, 5, 6, 7, 8, 9, 10].forEach(val => {
                const btn = document.createElement('button');
                btn.className = 'mod-btn';
                btn.innerText = `+${val}`;
                btn.onclick = () => toggleModifier(val);
                modGrid.appendChild(btn);
            });
        }

        function toggleNumber(val) {
            const index = currentRoundDraft.numbers.indexOf(val);
            if (index > -1) {
                currentRoundDraft.numbers.splice(index, 1);
            } else {
                // Check for duplicates
                if (currentRoundDraft.numbers.includes(val)) {
                    // This case is handled by logic but UI allows selecting once.
                    // Actually, let's allow selecting multiple to trigger "Bust"
                }
                currentRoundDraft.numbers.push(val);
            }
            updateLiveScore();
        }

        function toggleModifier(val) {
            const index = currentRoundDraft.modifiers.indexOf(val);
            if (index > -1) {
                currentRoundDraft.modifiers.splice(index, 1);
            } else {
                currentRoundDraft.modifiers.push(val);
            }
            updateLiveScore();
        }

        function toggleMultiplier() {
            currentRoundDraft.hasMultiplier = !currentRoundDraft.hasMultiplier;
            updateLiveScore();
        }

        function toggleSecondChance() {
            currentRoundDraft.hasSecondChance = !currentRoundDraft.hasSecondChance;
            updateLiveScore();
        }

        function updateLiveScore() {
            const { numbers, modifiers, hasMultiplier, hasSecondChance } = currentRoundDraft;

            // Check for bust (duplicate numbers)
            const uniqueNumbers = new Set(numbers);
            const duplicatesCount = numbers.length - uniqueNumbers.size;

            // Second chance allows 1 duplicate
            currentRoundDraft.isBusted = hasSecondChance ? (duplicatesCount > 1) : (duplicatesCount > 0);

            // Check for Flip 7 (7 different numbers)
            currentRoundDraft.hasFlip7 = uniqueNumbers.size >= 7 && !currentRoundDraft.isBusted;

            let score = 0;
            if (currentRoundDraft.isBusted) {
                score = 0;
            } else {
                // Number sum
                let numSum = numbers.reduce((a, b) => a + b, 0);
                if (hasMultiplier) numSum *= 2;

                // Modifiers
                const modSum = modifiers.reduce((a, b) => a + b, 0);

                score = numSum + modSum + (currentRoundDraft.hasFlip7 ? 15 : 0);
            }

            // Update UI
            document.getElementById('currentRoundScore').innerText = score;

            document.getElementById('multiplierBtn').className = `mod-btn ${hasMultiplier ? 'active' : ''}`;
            document.getElementById('multiplierBtn').innerText = hasMultiplier ? 'ACTIF' : 'ACTIVER';

            document.getElementById('secondChanceBtn').className = `mod-btn ${hasSecondChance ? 'active' : ''}`;
            document.getElementById('secondChanceBtn').innerText = hasSecondChance ? 'ACTIF' : 'ACTIVER';

            document.getElementById('bustRow').style.display = currentRoundDraft.isBusted ? 'flex' : 'none';
            document.getElementById('flip7Row').style.display = currentRoundDraft.hasFlip7 ? 'flex' : 'none';

            // Refresh card buttons
            document.querySelectorAll('.card-btn').forEach((btn, i) => {
                const val = parseInt(btn.innerText);
                const count = numbers.filter(n => n === val).length;
                btn.className = `card-btn ${count > 0 ? 'selected' : ''} ${count > 1 ? 'duplicate' : ''}`;
            });

            // Refresh mod buttons
            document.querySelectorAll('.modifier-grid .mod-btn').forEach(btn => {
                const val = parseInt(btn.innerText.replace('+', ''));
                btn.className = `mod-btn ${modifiers.includes(val) ? 'active' : ''}`;
            });
        }

        function saveRoundScore() {
            const score = parseInt(document.getElementById('currentRoundScore').innerText);
            players[currentPlayerIndex].score += score;
            players[currentPlayerIndex].rounds.push({
                score,
                timestamp: Date.now(),
                ...currentRoundDraft
            });
            saveToStorage();
            renderPlayers();
            closeModals();
        }

        function startNewRound() {
            // Future feature: show global round history or just a reset
            alert("Saisissez les scores de chaque joueur pour cette manche.");
        }

        // Init
        renderPlayers();

        // Handle Enter key in name input
        document.getElementById('playerNameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addPlayer();
        });
    </script>
</body>

</html>
